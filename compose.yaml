
services:
  postgres:
    image: postgres:16
    container_name: finlife-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: finlife_dev
      POSTGRES_USER: finlife_app
      POSTGRES_PASSWORD: Password!@#$
    ports:
      - "5432:5432"
    volumes:
      - finlife_postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finlife_app -d finlife_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  finlife_postgres_data: